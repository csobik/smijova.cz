<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Abstraktni energie spoluprace</title>
  <desc id="desc">Pozitivni abstraktni vizual se svetelnymi vrstvami a smerovymi krivkami.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8fa083" />
      <stop offset="55%" stop-color="#829276" />
      <stop offset="100%" stop-color="#75866a" />
    </linearGradient>
    <radialGradient id="glowA" cx="22%" cy="22%" r="54%">
      <stop offset="0%" stop-color="#f6f6f1" stop-opacity="0.86" />
      <stop offset="100%" stop-color="#f6f6f1" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="78%" cy="78%" r="56%">
      <stop offset="0%" stop-color="#e7ebde" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#e7ebde" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f6f6f1" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#f6f6f1" stop-opacity="0.42" />
      <stop offset="100%" stop-color="#f6f6f1" stop-opacity="0.08" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" />
    </filter>
  </defs>

  <rect width="1400" height="900" rx="36" fill="url(#bg)" />

  <ellipse cx="370" cy="250" rx="360" ry="230" fill="url(#glowA)" />
  <ellipse cx="1080" cy="700" rx="360" ry="240" fill="url(#glowB)" />

  <g fill="none" stroke-linecap="round">
    <path d="M130 640 C320 540, 470 710, 700 610 C900 520, 1040 690, 1260 610" stroke="url(#flow)" stroke-width="12" />
    <path d="M170 560 C340 470, 510 620, 700 540 C910 455, 1070 610, 1240 530" stroke="url(#flow)" stroke-width="8" />
    <path d="M220 470 C390 395, 560 500, 720 450 C900 395, 1040 490, 1190 440" stroke="url(#flow)" stroke-width="6" />
  </g>

  <g filter="url(#soft)">
    <circle cx="360" cy="300" r="96" fill="#f6f6f1" fill-opacity="0.44" />
    <circle cx="600" cy="230" r="64" fill="#f6f6f1" fill-opacity="0.34" />
    <circle cx="860" cy="300" r="84" fill="#f6f6f1" fill-opacity="0.32" />
    <circle cx="1060" cy="210" r="54" fill="#f6f6f1" fill-opacity="0.3" />
  </g>

  <g fill="none" stroke="#f6f6f1" stroke-opacity="0.28">
    <ellipse cx="770" cy="420" rx="300" ry="170" stroke-width="4" transform="rotate(16 770 420)" />
    <ellipse cx="770" cy="420" rx="380" ry="220" stroke-width="3" transform="rotate(16 770 420)" />
  </g>
</svg>
